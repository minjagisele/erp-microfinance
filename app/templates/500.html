{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="py-5">
            <i class="fas fa-exclamation-circle fa-4x text-danger mb-4"></i>
            <h1 class="display-1 fw-bold text-danger">500</h1>
            <h2 class="mb-3">Erreur serveur</h2>
            <p class="text-muted mb-4">
                Une erreur inattendue s'est produite. Nos équipes ont été notifiées et travaillent à résoudre le problème.
            </p>
            <div class="d-flex justify-content-center gap-2">
                <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary">
                    <i class="fas fa-home me-2"></i>
                    Accueil
                </a>
                <button onclick="location.reload()" class="btn btn-outline-secondary">
                    <i class="fas fa-sync-alt me-2"></i>
                    Réessayer
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
